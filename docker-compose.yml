# version: "3.9"

services:

  backend:
    build:
      context: ./backend

    container_name: payment-backend

    ports:
      - "8000:8000"

    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/exports:/app/exports
      - ./backend/app/db:/app/app/db

    env_file:
      - ./backend/.env

    restart: unless-stopped

  frontend:
    build:
      context: ./frontend

    container_name: payment-frontend

    ports:
      - "5173:80"

    depends_on:
      - backend

    restart: unless-stopped